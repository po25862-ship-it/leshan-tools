<script type="text/plain" id="app-jsx-source">const { useState, useMemo } = React;

// ---------- 圖示替代元件（不依賴 lucide-react，改用內建 emoji／符號） ----------
function IconBase({ children, size = 16, className = "" }) {
  return (
    <span
      className={className}
      style={{ fontSize: size, lineHeight: 1, display: "inline-flex", verticalAlign: "middle" }}
    >
      {children}
    </span>
  );
}
function CheckCircle2({ size, className }) { return <IconBase size={size} className={className}>✅</IconBase>; }
function XCircle({ size, className }) { return <IconBase size={size} className={className}>❌</IconBase>; }
function ChevronRight({ size, className }) { return <IconBase size={size} className={className}>›</IconBase>; }
function RotateCcw({ size, className }) { return <IconBase size={size} className={className}>↺</IconBase>; }
function Home({ size, className }) { return <IconBase size={size} className={className}>🏠</IconBase>; }
function AlertTriangle({ size, className }) { return <IconBase size={size} className={className}>⚠️</IconBase>; }
function Printer({ size, className }) { return <IconBase size={size} className={className}>🖨️</IconBase>; }


// ---------- 常數設定 ----------
const CITY_CAP = {
  "台北市": 3500,
  "新北市": 2500,
  "新竹縣": 2500,
  "新竹市": 2500,
  "桃園市（含林口龜山A7）": 2000,
  "其他縣市": 2000,
};

const FAMILY_TYPE = {
  general: { label: "一般戶", cap: 1000 },
  newlywed: { label: "新婚家庭（申請日前2年內結婚登記）", cap: 1200 },
  children: { label: "育兒家庭（育有未成年子女）", cap: 1500 },
};

// 3+3 利率遞減表：年利率(%), 該階段月數（不含文字敘述，年份由撥款年月動態計算）
const RATE_STAGES = [
  { rate: 1.775, months: 36 },
  { rate: 1.9, months: 12 },
  { rate: 2.025, months: 12 },
  { rate: 2.15, months: 12 },
  { rate: 2.275, months: Infinity },
];

// 民國年月 <-> 絕對月數 互轉
function rocToAbs(y, m) {
  return y * 12 + (m - 1);
}
function absToRoc(abs) {
  return { y: Math.floor(abs / 12), m: (abs % 12) + 1 };
}

const ORANGE = "#E8700A";

// ---------- 試算工具 ----------
function monthlyPayment(balance, annualRatePct, remainingMonths) {
  if (remainingMonths <= 0) return 0;
  const r = annualRatePct / 100 / 12;
  if (r === 0) return balance / remainingMonths;
  return (balance * r) / (1 - Math.pow(1 + r, -remainingMonths));
}

function buildAmortizationStages(principal, totalYears, disburseYear, disburseMonth, graceYears = 0) {
  const totalMonths = Math.round(totalYears * 12);
  const graceMonths = Math.min(Math.round((Number(graceYears) || 0) * 12), totalMonths);

  // 1. 依 RATE_STAGES 累計出每個利率區間的起訖月數（裁切至 totalMonths）
  const rateBoundaries = [];
  let cum = 0;
  for (const stage of RATE_STAGES) {
    if (cum >= totalMonths) break;
    const dur = stage.months === Infinity ? totalMonths - cum : Math.min(stage.months, totalMonths - cum);
    if (dur <= 0) continue;
    rateBoundaries.push({ start: cum, end: cum + dur - 1, rate: stage.rate, openEnded: stage.months === Infinity });
    cum += dur;
  }
  const findBoundary = (m) =>
    rateBoundaries.find((b) => m >= b.start && m <= b.end) || rateBoundaries[rateBoundaries.length - 1];

  // 2. 合併利率區間邊界與寬限期邊界，切出實際模擬用的子區間
  const breakSet = new Set([0, totalMonths]);
  rateBoundaries.forEach((b) => {
    breakSet.add(b.start);
    breakSet.add(b.end + 1);
  });
  if (graceMonths > 0 && graceMonths < totalMonths) breakSet.add(graceMonths);
  const breaks = Array.from(breakSet)
    .filter((x) => x >= 0 && x <= totalMonths)
    .sort((a, b) => a - b);

  // 3. 依序模擬每個子區間
  let balance = principal;
  let cursor = rocToAbs(disburseYear, disburseMonth);
  let elapsed = 0;
  const rows = [];
  let totalInterestAll = 0;
  let totalPrincipalAll = 0;

  for (let i = 0; i < breaks.length - 1; i++) {
    const start = breaks[i];
    const end = breaks[i + 1] - 1;
    const months = end - start + 1;
    if (months <= 0) continue;

    const boundary = findBoundary(start);
    const rate = boundary.rate;
    const r = rate / 100 / 12;
    const isGrace = start < graceMonths;
    const remainingFromHere = totalMonths - start;

    const payment = isGrace ? balance * r : monthlyPayment(balance, rate, remainingFromHere);
    const firstInterest = balance * r;
    const firstPrincipal = isGrace ? 0 : payment - firstInterest;

    let bal = balance;
    let stageInterestSum = 0;
    let stagePrincipalSum = 0;
    for (let m = 0; m < months; m++) {
      const interest = bal * r;
      const principalPaid = isGrace ? 0 : payment - interest;
      bal -= principalPaid;
      stageInterestSum += interest;
      stagePrincipalSum += principalPaid;
    }

    const startDate = absToRoc(cursor);
    const endDate = absToRoc(cursor + months - 1);
    const baseLabel =
      boundary.openEnded && end === totalMonths - 1
        ? `民國${startDate.y}年${startDate.m}月起`
        : startDate.y === endDate.y
        ? `民國${startDate.y}年`
        : `民國${startDate.y}-${endDate.y}年`;
    const label = isGrace ? `${baseLabel}（寬限期）` : baseLabel;

    rows.push({
      label,
      rate,
      months,
      isGrace,
      payment: Math.round(payment),
      firstInterest: Math.round(firstInterest),
      firstPrincipal: Math.round(firstPrincipal),
      stageInterestSum: Math.round(stageInterestSum),
      stagePrincipalSum: Math.round(stagePrincipalSum),
      stageTotalPayment: Math.round(payment * months),
      balanceAfter: Math.max(Math.round(bal), 0),
      elapsedStart: elapsed,
      elapsedEnd: elapsed + months - 1,
    });

    totalInterestAll += stageInterestSum;
    totalPrincipalAll += stagePrincipalSum;
    balance = bal;
    cursor += months;
    elapsed += months;
  }

  return {
    rows,
    totals: {
      totalInterest: Math.round(totalInterestAll),
      totalPrincipal: Math.round(totalPrincipalAll),
      totalPayment: Math.round(totalInterestAll + totalPrincipalAll),
    },
  };
}

function flatAmortization(principal, years, annualRatePct, graceYears = 0) {
  const totalMonths = Math.round(years * 12);
  const graceMonths = Math.min(Math.round((Number(graceYears) || 0) * 12), totalMonths);
  const r = annualRatePct / 100 / 12;

  if (graceMonths > 0) {
    const gracePayment = principal * r;
    const remainingMonths = totalMonths - graceMonths;
    const postPayment = monthlyPayment(principal, annualRatePct, remainingMonths);
    const totalInterestGrace = gracePayment * graceMonths;
    const totalPaidPost = postPayment * remainingMonths;
    const totalInterestPost = totalPaidPost - principal;
    return {
      hasGrace: true,
      graceMonths,
      gracePayment: Math.round(gracePayment),
      payment: Math.round(postPayment),
      postFirstInterest: Math.round(principal * r),
      postFirstPrincipal: Math.round(postPayment - principal * r),
      totalInterest: Math.round(totalInterestGrace + totalInterestPost),
      totalPaid: Math.round(totalInterestGrace + totalPaidPost),
      months: totalMonths,
    };
  }

  const payment = monthlyPayment(principal, annualRatePct, totalMonths);
  const totalPaid = payment * totalMonths;
  const totalInterest = totalPaid - principal;
  const firstInterest = principal * r;
  const firstPrincipal = payment - firstInterest;
  return {
    hasGrace: false,
    payment: Math.round(payment),
    totalPaid: Math.round(totalPaid),
    totalInterest: Math.round(totalInterest),
    firstInterest: Math.round(firstInterest),
    firstPrincipal: Math.round(firstPrincipal),
    months: totalMonths,
  };
}

// 查詢一般房貸在第 elapsedMonth 個月（0起算）當下的本金/利息拆算，供混合貸款各階段卡片使用
function generalLoanStateAtMonth(principal, annualRatePct, totalMonths, graceMonths, elapsedMonth) {
  if (elapsedMonth >= totalMonths) return null;
  const r = annualRatePct / 100 / 12;

  if (elapsedMonth < graceMonths) {
    const interest = principal * r;
    return { interest: Math.round(interest), principal: 0, payment: Math.round(interest), isGrace: true };
  }

  const remainingAtGraceEnd = totalMonths - graceMonths;
  const payment = monthlyPayment(principal, annualRatePct, remainingAtGraceEnd);
  const m = elapsedMonth - graceMonths;
  const growth = Math.pow(1 + r, m);
  const balance = r === 0 ? principal - payment * m : principal * growth - payment * ((growth - 1) / r);
  const interest = balance * r;
  const principalPortion = payment - interest;
  return {
    interest: Math.round(interest),
    principal: Math.round(principalPortion),
    payment: Math.round(payment),
    isGrace: false,
  };
}

const fmt = (n) => (isFinite(n) ? n.toLocaleString("zh-TW") : "-");

// ---------- 表單元件 ----------
function Field({ label, children, hint }) {
  return (
    <div className="mb-4">
      <label className="block text-sm font-medium text-neutral-700 mb-1">{label}</label>
      {children}
      {hint && <p className="text-xs text-neutral-400 mt-1">{hint}</p>}
    </div>
  );
}

function YesNoToggle({ value, onChange }) {
  return (
    <div className="flex gap-2">
      {[
        { v: true, t: "是" },
        { v: false, t: "否" },
      ].map((opt) => (
        <button
          key={String(opt.v)}
          type="button"
          onClick={() => onChange(opt.v)}
          className={`flex-1 py-2 rounded-lg border text-sm font-medium transition ${
            value === opt.v
              ? "text-white border-transparent"
              : "bg-white text-neutral-600 border-neutral-300"
          }`}
          style={value === opt.v ? { backgroundColor: ORANGE } : {}}
        >
          {opt.t}
        </button>
      ))}
    </div>
  );
}

function NumberInput({ value, onChange, placeholder, suffix }) {
  return (
    <div className="relative">
      <input
        type="number"
        inputMode="decimal"
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        className="w-full rounded-lg border border-neutral-300 px-3 py-2 pr-12 text-sm focus:outline-none focus:ring-2"
        style={{ "--tw-ring-color": ORANGE }}
      />
      {suffix && (
        <span className="absolute right-3 top-2.5 text-xs text-neutral-400">{suffix}</span>
      )}
    </div>
  );
}

// ---------- 主程式 ----------
function App() {
  const [step, setStep] = useState("form"); // form | result
  const [form, setForm] = useState({
    age: "",
    termYears: "40",
    income: "",
    city: "新北市",
    address: "",
    price: "",
    noOwnership: null,
    selfUse: null,
    firstTime: null,
    familyType: "general",
    ltv: "80",
    desiredLoan: "",
    disburseYear: "115",
    disburseMonth: "8",
    graceYears: "0",
  });

  const [generalLoan, setGeneralLoan] = useState({
    amount: "",
    years: "30",
    rate: "2.2",
    ltv: "70",
    bank: "",
    note: "",
    graceYears: "0",
  });

  const [blend, setBlend] = useState({
    enabled: false,
    amount: "",
    years: "20",
    rate: "2.2",
    bank: "",
    graceYears: "0",
  });

  const update = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  const requiredFilled = useMemo(() => {
    return (
      form.age !== "" &&
      form.termYears !== "" &&
      form.income !== "" &&
      form.price !== "" &&
      form.noOwnership !== null &&
      form.selfUse !== null &&
      form.firstTime !== null
    );
  }, [form]);

  const evaluation = useMemo(() => {
    if (!requiredFilled) return null;
    const age = Number(form.age);
    const term = Number(form.termYears);
    const income = Number(form.income);
    const price = Number(form.price);
    const cap = CITY_CAP[form.city];

    const checks = [
      {
        label: "本人、配偶及未成年子女名下皆無自有住宅",
        pass: form.noOwnership === true,
        detail: form.noOwnership === true ? "符合" : "現況名下有房，不符青安基本資格",
      },
      {
        label: "購屋需自住並可簽自住切結書",
        pass: form.selfUse === true,
        detail: form.selfUse === true ? "符合" : "非自住用途，不符資格",
      },
      {
        label: "借款人一生限貸1次（尚未申請過本貸款）",
        pass: form.firstTime === true,
        detail: form.firstTime === true ? "符合" : "已使用過青安貸款額度，不可再申請",
      },
      {
        label: "申貸時未滿50歲",
        pass: age > 0 && age < 50,
        detail: age >= 50 ? `目前 ${age} 歲，已滿50歲不符資格` : "符合",
      },
      {
        label: "申貸年齡＋核貸年限 ≤ 80",
        pass: age > 0 && term > 0 && age + term <= 80,
        detail:
          age + term > 80
            ? `${age} + ${term} = ${age + term}，超過80，需縮短年限至 ${Math.max(80 - age, 0)} 年以內`
            : "符合",
      },
      {
        label: "貸款年限 ≤ 40 年",
        pass: term > 0 && term <= 40,
        detail: term > 40 ? "超過最長40年" : "符合",
      },
      {
        label: "借款人本人年所得 ≤ 200 萬元",
        pass: income > 0 && income <= 200,
        detail: income > 200 ? `年所得 ${income} 萬，超過200萬上限` : "符合",
      },
      {
        label: `購屋總價（含鑑價）≤ 該區域上限 ${cap} 萬元`,
        pass: price > 0 && price <= cap,
        detail: price > cap ? `總價 ${price} 萬，超過 ${form.city} 上限 ${cap} 萬` : "符合",
      },
    ];

    const eligible = checks.every((c) => c.pass);
    const familyCap = FAMILY_TYPE[form.familyType].cap;
    const ltv = Number(form.ltv) > 0 ? Math.min(Number(form.ltv), 80) : 80;
    const byLtv = price > 0 ? Math.round(price * (ltv / 100)) : 0;
    const suggestedLoan = Math.min(familyCap, byLtv || familyCap);
    const desired = Number(form.desiredLoan) || suggestedLoan;
    const finalLoan = Math.min(desired, familyCap, byLtv || Infinity);

    let amortRows = [];
    let amortTotals = null;
    if (eligible && finalLoan > 0 && term > 0) {
      const dy = Number(form.disburseYear) || 115;
      const dm = Number(form.disburseMonth) || 8;
      const result = buildAmortizationStages(finalLoan * 10000, term, dy, dm, Number(form.graceYears) || 0);
      amortRows = result.rows;
      amortTotals = result.totals;
    }

    return { checks, eligible, cap, familyCap, suggestedLoan, finalLoan, amortRows, amortTotals, ltv };
  }, [form, requiredFilled]);

  const generalResult = useMemo(() => {
    const amount = Number(generalLoan.amount);
    const years = Number(generalLoan.years);
    const rate = Number(generalLoan.rate);
    if (!amount || !years || !rate) return null;
    return flatAmortization(amount * 10000, years, rate, Number(generalLoan.graceYears) || 0);
  }, [generalLoan]);

  const blendResult = useMemo(() => {
    if (!blend.enabled) return null;
    const amount = Number(blend.amount);
    const years = Number(blend.years);
    const rate = Number(blend.rate);
    if (!amount || !years || !rate) return null;
    return flatAmortization(amount * 10000, years, rate, Number(blend.graceYears) || 0);
  }, [blend]);

  const blendGapSuggestion = useMemo(() => {
    if (!evaluation || !evaluation.eligible) return 0;
    const desired = Number(form.desiredLoan) || 0;
    const gap = desired - evaluation.finalLoan;
    return gap > 0 ? Math.round(gap) : 0;
  }, [evaluation, form.desiredLoan]);

  const resetAll = () => {
    setStep("form");
    setForm({
      age: "",
      termYears: "40",
      income: "",
      city: "新北市",
      address: "",
      price: "",
      noOwnership: null,
      selfUse: null,
      firstTime: null,
      familyType: "general",
      ltv: "80",
      desiredLoan: "",
      disburseYear: "115",
      disburseMonth: "8",
      graceYears: "0",
    });
    setGeneralLoan({ amount: "", years: "30", rate: "2.2", ltv: "70", bank: "", note: "", graceYears: "0" });
    setBlend({ enabled: false, amount: "", years: "20", rate: "2.2", bank: "", graceYears: "0" });
  };

  return (
    <div className="min-h-screen bg-neutral-50 pb-16">
      <style>{`
        @media print {
          .no-print { display: none !important; }
          body { background: white !important; }
          .print-card { break-inside: avoid; }
          .print-header-block { display: block !important; }
        }
      `}</style>
      {/* Header */}
      <div className="no-print text-white px-5 py-5 sticky top-0 z-10 shadow-sm" style={{ backgroundColor: ORANGE }}>
        <div className="flex items-center gap-2">
          <Home size={20} />
          <h1 className="text-lg font-bold">新青安3.0 資格快速試算</h1>
        </div>
        <p className="text-xs text-white/85 mt-1">客戶自評條件 → 判定適用方案／利率，或轉入一般房貸試算</p>
      </div>

      <div className="max-w-md mx-auto px-4 pt-5">
        {step === "form" && (
          <div className="bg-white rounded-2xl shadow-sm border border-neutral-200 p-5">
            <Field label="借款人年齡（申貸時，週歲）">
              <NumberInput value={form.age} onChange={(v) => update("age", v)} placeholder="例：35" suffix="歲" />
            </Field>

            <Field label="預估撥款年月（民國）" hint="用於計算每階段利率對應的實際年份，預設為3.0上路日115年8月">
              <div className="flex gap-2">
                <NumberInput value={form.disburseYear} onChange={(v) => update("disburseYear", v)} placeholder="115" suffix="年" />
                <NumberInput value={form.disburseMonth} onChange={(v) => update("disburseMonth", v)} placeholder="8" suffix="月" />
              </div>
            </Field>

            <Field label="希望貸款年限" hint="青安最長40年，實際核貸須符合「年齡＋年限≤80」">
              <NumberInput value={form.termYears} onChange={(v) => update("termYears", v)} placeholder="例：40" suffix="年" />
            </Field>

            <Field label="新青安寬限期" hint="最長5年，期間僅繳利息、本金不攤還；不需要可填0">
              <NumberInput value={form.graceYears} onChange={(v) => update("graceYears", v)} placeholder="0" suffix="年" />
            </Field>

            <Field label="借款人本人年所得總額" hint="不含配偶，僅計算本人">
              <NumberInput value={form.income} onChange={(v) => update("income", v)} placeholder="例：80" suffix="萬" />
            </Field>

            <Field label="購屋所在縣市">
              <select
                value={form.city}
                onChange={(e) => update("city", e.target.value)}
                className="w-full rounded-lg border border-neutral-300 px-3 py-2 text-sm bg-white"
              >
                {Object.keys(CITY_CAP).map((c) => (
                  <option key={c} value={c}>
                    {c}（上限 {CITY_CAP[c]} 萬）
                  </option>
                ))}
              </select>
            </Field>

            <Field label="房屋地址（選填，會顯示在輸出的PDF報告上）">
              <input
                type="text"
                value={form.address}
                onChange={(e) => update("address", e.target.value)}
                placeholder="例：新北市林口區OO路OO號"
                className="w-full rounded-lg border border-neutral-300 px-3 py-2 text-sm"
              />
            </Field>

            <Field label="房屋總價（或預估銀行鑑價，取兩者較高者）">
              <NumberInput value={form.price} onChange={(v) => update("price", v)} placeholder="例：1800" suffix="萬" />
            </Field>

            <Field label="本人、配偶及未成年子女名下皆無自有住宅？">
              <YesNoToggle value={form.noOwnership} onChange={(v) => update("noOwnership", v)} />
            </Field>

            <Field label="購屋是否自住（可簽自住切結書）？">
              <YesNoToggle value={form.selfUse} onChange={(v) => update("selfUse", v)} />
            </Field>

            <Field label="是否為第一次申請本貸款（尚未使用過青安額度）？">
              <YesNoToggle value={form.firstTime} onChange={(v) => update("firstTime", v)} />
            </Field>

            <Field label="家庭類型" hint="影響貸款額度上限與利息補貼金額">
              <div className="grid grid-cols-1 gap-2">
                {Object.entries(FAMILY_TYPE).map(([k, v]) => (
                  <button
                    key={k}
                    type="button"
                    onClick={() => update("familyType", k)}
                    className={`text-left px-3 py-2 rounded-lg border text-sm ${
                      form.familyType === k ? "border-transparent text-white" : "bg-white border-neutral-300 text-neutral-700"
                    }`}
                    style={form.familyType === k ? { backgroundColor: ORANGE } : {}}
                  >
                    {v.label}（上限 {v.cap} 萬）
                  </button>
                ))}
              </div>
            </Field>

            <Field label="預估貸款成數" hint="最高80成，可依客戶自備款狀況調整">

                      <div className="rounded-lg p-3" style={{ backgroundColor: "#FFF3E8" }}>

                        <div className="grid grid-cols-3 gap-2 text-center items-end">
                          <div>
                            <p className="text-[10px] text-neutral-400">本金合計</p>
                            <p className="text-sm font-semibold text-neutral-700">{fmt(Number(generalLoan.amount) * 10000)}</p>
                          </div>
                          <div>
                            <p className="text-[10px] text-neutral-400">利息合計</p>
                            <p className="text-sm font-semibold text-neutral-700">{fmt(generalResult.totalInterest)}</p>
                          </div>
                          <div>
                            <p className="text-[10px] text-neutral-400">總繳金額</p>
                            <p className="text-xl font-bold" style={{ color: ORANGE }}>
                              {fmt(generalResult.totalPaid)}
                            </p>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </>
            )}

            <button
              onClick={resetAll}
              className="no-print w-full py-3 rounded-xl font-semibold border border-neutral-300 text-neutral-600 flex items-center justify-center gap-1 bg-white"
            >
              <RotateCcw size={16} /> 重新試算下一位客戶
            </button>
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

(function(){
